# ============================================================
# .github/workflows/daily.yml
# GitHub Actions – Naukri Job AI Agent Daily Scheduler
# Runs at 9:00 AM IST = 3:30 AM UTC every day
# ============================================================

name: Naukri Job AI Agent – Daily 9AM IST

on:
  # Cron schedule: 3:30 AM UTC = 9:00 AM IST
  schedule:
    - cron: '30 3 * * *'

  # Also allows manual trigger from GitHub Actions tab (for testing)
  workflow_dispatch:

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Step 1: Checkout the repository code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js 20 (LTS)
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: 📦 Install Dependencies
        run: npm install

      # Step 4: Run the Naukri Job Agent
      - name: 🚀 Run Naukri Job Agent
        env:
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:       ${{ secrets.GMAIL_PASS }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          RAPIDAPI_KEY:     ${{ secrets.RAPIDAPI_KEY }}
        run: node index.js
