# ============================================================
# .github/workflows/daily.yml
# GitHub Actions – Naukri Job AI Agent Daily Scheduler
# Runs at 9:00 AM IST = 3:30 AM UTC every day
# ============================================================

name: Naukri Job AI Agent – Daily 9AM IST

on:
  # Cron schedule: 3:30 AM UTC = 9:00 AM IST
  schedule:
    - cron: '30 3 * * *'

  # Also allows manual trigger from GitHub Actions tab (for testing)
  workflow_dispatch:

jobs:
  run-job-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # Step 1: Checkout the repository code
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js 20 (LTS)
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install Google Chrome (required for Puppeteer headless browser)
      - name: 🌐 Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # Step 4: Install dependencies
      - name: 📦 Install Dependencies
        run: npm install

      # Step 5: Run the Naukri Job Agent
      - name: 🚀 Run Naukri Job Agent
        env:
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:          ${{ secrets.GMAIL_PASS }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
          RAPIDAPI_KEY:        ${{ secrets.RAPIDAPI_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          TWILIO_SID:          ${{ secrets.TWILIO_SID }}
          TWILIO_AUTH_TOKEN:   ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE:        ${{ secrets.TWILIO_PHONE }}
          USER_PHONE:          ${{ secrets.USER_PHONE }}
          AUTO_APPLY_ENABLED:  true
          AUTO_APPLY_MODE:     DRY_RUN
        run: node index.js

